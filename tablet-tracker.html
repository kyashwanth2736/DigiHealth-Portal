<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal | DigiHealth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2c5282;
            --light-blue: #ebf8ff;
            --accent-teal: #38b2ac;
            --text-dark: #2d3748;
            --bg-white: rgba(255, 255, 255, 0.95);
            --danger-red: #e53e3e;
            --success-green: #38a169;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            color: var(--text-dark);
            background-color: var(--light-blue);
        }

        #scroll-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(235, 248, 255, 0.85), rgba(235, 248, 255, 0.85)), url('logo.jpg');
            background-size: cover; background-position: center; z-index: -1;
        }

        /* --- HEADER ALIGNMENT WITH BACK BUTTON --- */
        .brand-header {
            background-color: var(--primary-blue);
            color: white; padding: 15px 40px;
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
            position: sticky; top: 0; z-index: 100;
        }

        .header-logo img { height: 50px; border-radius: 50%; }

        .header-right-group {
            display: flex;
            align-items: center;
            gap: 15px;
            justify-self: end;
        }

        #master-clock {
            background: #fff; 
            color: var(--primary-blue);
            padding: 8px 20px; 
            border-radius: 25px; 
            font-weight: 800;
            font-size: 0.85rem;
            min-width: 130px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: background 0.3s;
        }

        .btn-back:hover { background: rgba(255, 255, 255, 0.3); }

        #notification-center { width: 100%; max-width: 950px; margin: 20px auto 0; }
        .alert-box {
            padding: 15px; border-radius: 8px; margin-bottom: 10px; font-weight: 600;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .missed { background: #fff5f5; color: var(--danger-red); border-left: 5px solid var(--danger-red); }
        .taken-msg { background: #f0fff4; color: var(--success-green); border-left: 5px solid var(--success-green); }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        .form-card {
            background: var(--bg-white); padding: 30px;
            border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        
        .input-row { display: flex; gap: 20px; margin-bottom: 15px; flex-wrap: wrap; }
        .input-group { flex: 1; min-width: 200px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        .input-group input { 
            width: 100%; padding: 12px; border: 1px solid #cbd5e0; 
            border-radius: 8px; box-sizing: border-box; 
        }

        .schedule-box { display: flex; gap: 20px; align-items: center; margin-top: 10px; }
        .schedule-box label { font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .btn-add {
            background: var(--accent-teal); color: white; border: none;
            padding: 15px; border-radius: 8px; font-weight: 700; cursor: pointer;
            width: 100%; margin-top: 20px;
        }

        .med-row {
            background: white; padding: 20px; border-radius: 12px;
            display: grid; 
            grid-template-columns: 80px 1.5fr 1fr 120px 180px 80px;
            align-items: center; gap: 20px; margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .user-tablet-img {
            width: 70px; height: 70px; border-radius: 8px;
            object-fit: cover; background: #f1f5f9; border: 1px solid #e2e8f0;
        }
        
        .duration-badge {
            background: #edf2f7; padding: 6px 12px; border-radius: 5px;
            font-size: 0.8rem; font-weight: 700; color: var(--primary-blue);
            text-align: center;
        }

        .check-group { display: flex; gap: 8px; }
        .time-pill {
            padding: 8px 12px; border-radius: 15px; font-size: 0.75rem;
            background: #f1f5f9; cursor: pointer; font-weight: 700; color: #94a3b8;
            border: 1px solid transparent; width: 45px; text-align: center;
        }
        .active-sched { border: 1px dashed var(--primary-blue); color: var(--text-dark); }
        .taken { background: var(--accent-teal) !important; color: white !important; border: none; }

        .btn-remove { color: var(--danger-red); background: none; border: none; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

    <div id="scroll-bg"></div>

    <header class="brand-header">
        <div class="header-logo"><img src="logo.png" alt="Logo"></div>
        <h1 style="margin:0;">Medicine Tracker</h1>
        <div class="header-right-group">
            <div id="master-clock">Day Cycle: 0s</div>
            <a href="javascript:history.back()" class="btn-back">← Back</a>
        </div>
    </header>

    <div id="notification-center"></div>

    <div class="container">
        <div class="form-card">
            <h2 style="margin-top:0; color:var(--primary-blue)">Register Tablet Course</h2>
            <div class="input-row">
                <div class="input-group">
                    <label>Tablet Name</label>
                    <input type="text" id="tName" placeholder="Name">
                </div>
                <div class="input-group">
                    <label>Duration (Days)</label>
                    <input type="number" id="tDays" placeholder="Total Days">
                </div>
                <div class="input-group">
                    <label>Upload Photo</label>
                    <input type="file" id="tImage" accept="image/*">
                </div>
            </div>
            <div class="input-group">
                <label>Usage Instructions</label>
                <input type="text" id="tUsage" placeholder="Usage description...">
            </div>
            
            <div class="input-group">
                <label>Set Schedule (30s Cycle)</label>
                <div class="schedule-box">
                    <label><input type="checkbox" id="morn"> Morning (0-5s)</label>
                    <label><input type="checkbox" id="aft"> Afternoon (11-15s)</label>
                    <label><input type="checkbox" id="even"> Evening (21-25s)</label>
                </div>
            </div>
            <button class="btn-add" onclick="processNewTablet()">Start Course</button>
        </div>

        <div id="medList"></div>
    </div>

    <script>
        let medications = [];
        let secondCounter = 0;

        setInterval(() => {
            secondCounter++;
            if (secondCounter > 30) {
                secondCounter = 1;
                handleDayReset();
            }
            document.getElementById('master-clock').innerText = `Day Cycle: ${secondCounter}s`;
            checkWindows();
        }, 1000);

        function handleDayReset() {
            medications.forEach(med => {
                if (med.daysLeft > 0) {
                    med.daysLeft--;
                    med.taken = { morning: false, afternoon: false, evening: false };
                    med.notified = { morning: false, afternoon: false, evening: false };
                }
            });
            renderList();
            showNotification("System", "New cycle started.", "taken-msg");
        }

        function checkWindows() {
            medications.forEach(med => {
                if (med.daysLeft <= 0) return;
                if (secondCounter === 6 && med.schedule.morning && !med.taken.morning && !med.notified.morning) {
                    showNotification("Missed!", `Morning dose for ${med.name}.`, "missed");
                    med.notified.morning = true;
                }
                if (secondCounter === 16 && med.schedule.afternoon && !med.taken.afternoon && !med.notified.afternoon) {
                    showNotification("Missed!", `Afternoon dose for ${med.name}.`, "missed");
                    med.notified.afternoon = true;
                }
                if (secondCounter === 26 && med.schedule.evening && !med.taken.evening && !med.notified.evening) {
                    showNotification("Missed!", `Evening dose for ${med.name}.`, "missed");
                    med.notified.evening = true;
                }
            });
        }

        function showNotification(title, msg, type) {
            const center = document.getElementById('notification-center');
            const box = document.createElement('div');
            box.className = `alert-box ${type}`;
            box.innerHTML = `<span><strong>${title}</strong> ${msg}</span><button style="background:none; border:none; cursor:pointer;" onclick="this.parentElement.remove()">✕</button>`;
            center.prepend(box);
            setTimeout(() => box.remove(), 5000);
        }

        function processNewTablet() {
            const name = document.getElementById('tName').value;
            const days = document.getElementById('tDays').value;
            const usage = document.getElementById('tUsage').value;
            const fileInput = document.getElementById('tImage');
            const sM = document.getElementById('morn').checked;
            const sA = document.getElementById('aft').checked;
            const sE = document.getElementById('even').checked;

            if (!name || !days || !usage || (!sM && !sA && !sE)) return alert("Please fill all details.");

            const reader = new FileReader();
            reader.onload = function(e) {
                medications.push({
                    id: Date.now(),
                    name, usage,
                    daysLeft: parseInt(days),
                    img: e.target.result,
                    schedule: { morning: sM, afternoon: sA, evening: sE },
                    taken: { morning: false, afternoon: false, evening: false },
                    notified: { morning: false, afternoon: false, evening: false }
                });
                renderList();
                document.getElementById('tName').value = '';
                document.getElementById('tDays').value = '';
                document.getElementById('tUsage').value = '';
            };
            if(fileInput.files[0]) reader.readAsDataURL(fileInput.files[0]);
            else alert("Please upload a photo.");
        }

        function toggleDose(id, time) {
            const med = medications.find(m => m.id === id);
            if (!med.schedule[time] || med.daysLeft <= 0) return;

            const inWindow = (time === 'morning' && secondCounter <= 5) || 
                             (time === 'afternoon' && secondCounter >= 11 && secondCounter <= 15) || 
                             (time === 'evening' && secondCounter >= 21 && secondCounter <= 25);

            if (!inWindow && !med.taken[time]) {
                showNotification("Invalid:", `Time window closed for ${time}.`, "missed");
                return;
            }

            med.taken[time] = !med.taken[time];
            if (med.taken[time]) showNotification("Success:", `${time} dose recorded.`, "taken-msg");
            renderList();
        }

        function renderList() {
            const list = document.getElementById('medList');
            list.innerHTML = '';
            medications.forEach(med => {
                const row = document.createElement('div');
                row.className = 'med-row';
                row.innerHTML = `
                    <img src="${med.img}" class="user-tablet-img">
                    <div>
                        <h4 style="margin:0">${med.name}</h4>
                        <small style="color:#718096">${med.usage}</small>
                    </div>
                    <div class="duration-badge">${med.daysLeft > 0 ? med.daysLeft + ' days left' : 'Finished'}</div>
                    <div class="check-group">
                        <div class="time-pill ${med.schedule.morning ? 'active-sched' : ''} ${med.taken.morning ? 'taken' : ''}" onclick="toggleDose(${med.id}, 'morning')">M</div>
                        <div class="time-pill ${med.schedule.afternoon ? 'active-sched' : ''} ${med.taken.afternoon ? 'taken' : ''}" onclick="toggleDose(${med.id}, 'afternoon')">A</div>
                        <div class="time-pill ${med.schedule.evening ? 'active-sched' : ''} ${med.taken.evening ? 'taken' : ''}" onclick="toggleDose(${med.id}, 'evening')">E</div>
                    </div>
                    <button class="btn-remove" onclick="medications = medications.filter(m => m.id !== ${med.id}); renderList();">Remove</button>
                `;
                list.appendChild(row);
            });
        }
    </script>
</body>
</html>
